[workspace]
members = ["dist:dist/mantissa"]

[dist]
cargo-dist-version = "0.32.0"
ci = ["github"]
pr-run-mode = "skip"
targets = [
    "x86_64-unknown-linux-gnu",
    "aarch64-unknown-linux-gnu",
]
installers = ["shell"]
unix-archive = ".tar.xz"
checksum = "sha256"
github-attestations = true
github-build-setup = "../dist-build-setup.yml"

[dist.github-custom-runners]
global = "mantissa-linux-x64-8-core"
x86_64-unknown-linux-gnu = "mantissa-linux-x64-8-core"
aarch64-unknown-linux-gnu = "mantissa-linux-arm64-8-core"

[dist.github-action-commits]
"actions/attest" = "59d89421af93a897026c735860bf21b6eb4f7b26"
"actions/checkout" = "df4cb1c069e1874edd31b4311f1884172cec0e10"
"actions/download-artifact" = "3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c"
"actions/upload-artifact" = "043fb46d1a93c77aae656e7c1c64a875d1fc6a0a"
