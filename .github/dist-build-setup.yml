- name: Install system build dependencies
  shell: bash
  run: |
    sudo apt-get update
    sudo apt-get install -y --no-install-recommends \
      build-essential \
      ca-certificates \
      capnproto \
      clang \
      cmake \
      curl \
      git \
      lld \
      llvm \
      pkg-config \
      zstd

- name: Install Rust nightly for eBPF
  shell: bash
  run: |
    rustup toolchain install nightly --profile minimal --component rust-src
    echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

- name: Install bpf-linker
  shell: bash
  run: |
    case "$(uname -m)" in
      x86_64) bpf_linker_arch="x86_64" ;;
      aarch64|arm64) bpf_linker_arch="aarch64" ;;
      *) echo "unsupported bpf-linker host architecture: $(uname -m)" >&2; exit 1 ;;
    esac

    bpf_linker_version="v0.10.4"
    bpf_linker_archive="bpf-linker-${bpf_linker_arch}-unknown-linux-musl.tar.zst"
    bpf_linker_url="https://github.com/aya-rs/bpf-linker/releases/download/${bpf_linker_version}/${bpf_linker_archive}"

    curl --proto '=https' --tlsv1.2 -LsSfO "$bpf_linker_url"
    mkdir -p "$HOME/.local/bin"
    tar -xpf "$bpf_linker_archive" -C "$HOME/.local/bin"
    export PATH="$HOME/.local/bin:$PATH"
    echo "$HOME/.local/bin" >> "$GITHUB_PATH"
    bpf-linker --version
