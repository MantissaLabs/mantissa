name: Cargo Build & Test

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  build_and_test:
    name: Rust project - latest
    runs-on: ubuntu-latest
    strategy:
      matrix:
        toolchain:
          - stable
    steps:
      - uses: actions/checkout@v4
      - run: rustup update ${{ matrix.toolchain }} && rustup default ${{ matrix.toolchain }}
      - name: Install eBPF toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm pkg-config libelf-dev zlib1g-dev
          rustup toolchain install nightly --component rust-src --component llvm-tools-preview
          cargo install bpf-linker --locked
      - name: Install Cap’n Proto
        run: |
          sudo apt-get update
          sudo apt-get install -y capnproto libcapnp-dev
      - name: Build
        env:
          MANTISSA_BPF_TOOLCHAIN: nightly
        run: cargo build
      - name: Test
        env:
          MANTISSA_BPF_TOOLCHAIN: nightly
          CARGO_BUILD_JOBS: 1
          CARGO_INCREMENTAL: 0
        run: cargo test --workspace --lib --bins --tests --examples --features testkit
