[package]
name = "mantissa"
version = "0.1.0"
authors = ["Alexandre Beslic"]
license = "MIT/Apache-2.0"
description = "Decentralized cluster management"
homepage = "https://mantissa.io"
repository = "https://github.com/abronan/mantissa"
readme = "README.md"
edition = "2024"

[workspace]
members = [
    "crates/crdt_store",
    "crates/protocol",
    "crates/net",
    "crates/client",
    "crates/health",
]

[build-dependencies]
aya-build = { git = "https://github.com/aya-rs/aya" }
anyhow = "1"

[dependencies]
crdt_store = { path = "crates/crdt_store" }
protocol = { path = "crates/protocol" }
net = { path = "crates/net" }
client = { path = "crates/client" }
health = { path = "crates/health" }
clap = { version = "4.5.45", features = ["derive", "cargo"] }
chrono = { version = "0.4", features = ["serde"] }
tabwriter = "1"
async-trait = "0.1.88"
thiserror = "2.0.12"
async-channel = "2.5.0"
rand = { version = "0.9.2", features = ["std"] }
bytes = "1"
data-encoding = "2.9.0"
blake3 = "1"
uuid = { version = "1", features = ["v4", "v7", "fast-rng", "serde"] }
futures = "0.3.31"
tokio = { version = "1", features = ["full"] }
tokio-util = { version = "0.7", features = ["compat"] }
x25519-dalek = { version = "2.0.1", features = ["static_secrets"] }
ed25519-dalek = { version = "2", default-features = false, features = [
    "alloc",
] }
getrandom = "0.2"

# Container / MicroVMs / Task management
bollard = "0.18.1"

# boringtun is used for inter-cluster communication via wireguard.
snow = "0.9.6"

# used to fetch cpu system level information.
raw-cpuid = "11.5.0"

# redb is used as our storage engine for the cluster state.
redb = "2.5.0"

# crdt based structures useful for state replication and conflict resolution.
merkle-search-tree = "0.8.0"
crdt_tree = "0.0.16"
# melda = "0.2.3"
crdts = "7.3.2"

# Serialization / Parsing / Configuration
ron = "0.10.1"
serde = { version = "1.0.190", features = ["derive"] }
serde_bytes = "0.11"
bincode = "1.3.3"

# capnproto
capnp = "0.21.4"
capnp-rpc = "0.21"
capnp-futures = "0.21"

sysinfo = "0.36.1"
dirs = "5.0.1"
anyhow = "1"
arc-swap = "1.6"

# Logging
tracing = "0.1"
tracing-log = "0.2"
tracing-subscriber = { version = "0.3.18", features = [
    "fmt",
    "env-filter",
    "ansi",
    "time",
] }
time = { version = "0.3", features = ["local-offset", "macros"] }
log = "0.4"

# used for fully deterministic hashing across platforms and compiler versions (XXHash).
twox-hash = "2.1.1"
once_cell = "1.21.3"
base64 = "0.22.1"
chacha20poly1305 = "0.10.1"
hkdf = "0.12.4"
sha2 = "0.10.9"
tempfile = "3"
libc = "0.2"

[dev-dependencies]
tokio = { version = "1", features = ["rt", "macros", "net", "time"] }
tempfile = "3"
anyhow = "1"

# eBPF / Networking
[target.'cfg(target_os = "linux")'.dependencies]
aya = "0.13.1"

[features]
default = []
testkit = []
