[package]
name = "mantissa"
version = "0.1.0"
authors = ["Alexandre Beslic"]
license = "MIT/Apache-2.0"
description = "Decentralized cluster management"
homepage = "https://mantissa.io"
repository = "https://github.com/abronan/mantissa"
readme = "README.md"
build = "build.rs"
edition = "2021"

[build-dependencies]
capnpc = "0.21.0"
aya-build = { git = "https://github.com/aya-rs/aya" }
anyhow = "1"

[dependencies]
clap = { version = "~4.4.2", features = ["derive", "cargo"] }
chrono = { version = "0.4", features = ["serde"] }
tabwriter = "1"
tokio = { version = "1", features = ["full"] }
tokio-util = { version = "0.7", features = ["compat"] }
async-trait = "0.1.88"
thiserror = "2.0.12"
futures = "0.3.31"
async-channel = "2.5.0"
rand = "0.9.2"

# Container / MicroVMs / Workload management
bollard = "0.18.1"

# boringtun is used for inter-cluster communication via wireguard.
snow = "0.9.6"

# used to fetch cpu system level information.
raw-cpuid = "11.5.0"

# redb is used as our storage engine for the cluster state.
redb = "2.5.0"

# crdt based structures useful for state replication and conflict resolution.
merkle-search-tree = "0.8.0"
crdt_tree = "0.0.16"
# melda = "0.2.3"
crdts = "7.3.2"

# Serialization / Parsing / Configuration
ron = "0.10.1"
serde = { version = "1.0.190", features = ["derive"] }
bincode = "1.3.3"

# capnproto
capnp = "0.21.4"
capnp-rpc = "0.21"
capnp-futures = "0.21"

sysinfo = "0.36.1"
log = "0.4"
dirs = "5.0.1"
anyhow = "1"

# used for fully deterministic hashing across platforms and compiler versions (XXHash).
twox-hash = "1.6.3"

[dependencies.uuid]
version = "1.16.0"
# Lets you generate random UUIDs
features = ["v4"]

[features]
default = []

# eBPF / Networking
[target.'cfg(target_os = "linux")'.dependencies]
aya = "0.13.1"
