arch: "aarch64"
name: "mantissa-dev"
vmType: "qemu"
cpus: 8
memory: "16GiB"
disk: "100GiB"

images:
  - location: "https://cloud.debian.org/images/cloud/bookworm/latest/debian-12-generic-arm64.qcow2"
    arch: "aarch64"

mounts:
  - location: "~/hack/mantissa"
    mountPoint: "/mnt/mantissa"
    writable: true
    fsType: "virtiofs"
    options:
      - "noatime"

# To configure the terminal with ghostty:
#   infocmp -x | ssh -i ~/.lima/_config/user -p <port> <username>@127.0.0.1 -- tic -x -
ssh:
  localPort: 60022

portForwards:
  - guest: 22
    host: 2222

provision:
  - mode: system
    script: |
      set -euxo pipefail
      apt-get update && apt-get upgrade -y
      apt-get install -y build-essential curl git
  - mode: user
    script: |
      set -euxo pipefail
      # Install rustup and Rust toolchain if not already installed.
      if ! command -v rustup >/dev/null 2>&1; then
        curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
      fi
      # Ensure that cargo and rustup are added to the PATH for interactive shells.
      if ! grep -q 'cargo/bin' ~/.bashrc; then
        echo 'export PATH="$HOME/.cargo/bin:$PATH"' >> ~/.bashrc
      fi
      if ! grep -q 'cargo/bin' ~/.profile; then
        echo 'export PATH="$HOME/.cargo/bin:$PATH"' >> ~/.profile
      fi
