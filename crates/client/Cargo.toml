[package]
name = "client"
version = "0.1.0"
edition = "2021"

[dependencies]
anyhow = "1"
capnp = "0.21.4"
capnp-rpc = "0.21"
capnp-futures = "0.21"
futures = "0.3.31"
protocol = { path = "../protocol" }
net = { path = "../net" }
tabwriter = "1"
tokio = { version = "1", features = ["net", "rt"] }
tokio-util = { version = "0.7", features = ["compat"] }
uuid = { version = "1" }

[features]
default = []
testkit = []

