[package]
name = "client"
version = "0.1.0"
edition = "2024"

[dependencies]
anyhow = "1"
capnp = { git = "https://github.com/capnproto/capnproto-rust", branch = "master" }
capnp-rpc = { git = "https://github.com/capnproto/capnproto-rust", branch = "master" }
capnp-futures = { git = "https://github.com/capnproto/capnproto-rust", branch = "master" }
futures = "0.3.31"
protocol = { path = "../protocol" }
net = { path = "../net" }
tabwriter = "1"
tokio = { version = "1", features = ["net", "rt"] }
tokio-util = { version = "0.7", features = ["compat"] }
uuid = { version = "1" }
serde = { version = "1", features = ["derive"] }
ron = "0.10.1"

[features]
default = []
testkit = []
