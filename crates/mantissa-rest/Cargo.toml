[package]
name = "mantissa-rest"
version = "0.1.0"
edition = "2024"
license.workspace = true
repository.workspace = true

[[bin]]
name = "mantissa-rest"
path = "src/main.rs"

[lints]
workspace = true

[dependencies]
axum = "0.8"
mantissa-client = { path = "../mantissa-client" }
mantissa-protocol = { path = "../mantissa-protocol" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["macros", "net", "rt", "rt-multi-thread", "sync"] }

[dev-dependencies]
tower = { version = "0.5", features = ["util"] }
